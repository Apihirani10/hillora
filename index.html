<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hillora - Travel</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI', sans-serif;
}

body{
  overflow-x:hidden;
  background:#f9f9f9;
}

/* HEADER */
header{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 50px;
  z-index:1000;
  background:rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
}

.logo{
  color:white;
  font-size:26px;
  font-weight:bold;
  letter-spacing:1px;
}

nav a{
  color:white;
  margin-left:25px;
  text-decoration:none;
  transition:0.3s;
}

nav a:hover{
  color:#f1aca2;
}

/* HERO */
.hero{
  position:relative;
  height:100vh;
  overflow:hidden;
}

.hero video{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
}

/* OVERLAY */
.overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(rgba(0,0,0,0.5), rgba(90,46,72,0.8));
}

/* CONTENT */
.content{
  position:relative;
  z-index:2;
  color:white;
  text-align:center;
  top:50%;
  transform:translateY(-50%);
  padding:20px;
  animation:fadeIn 2s ease;
}

.content h1{
  font-size:65px;
  letter-spacing:2px;
}

.content p{
  font-size:22px;
  margin-top:10px;
  opacity:0.9;
}

.btn{
  margin-top:25px;
  padding:12px 35px;
  background:#f1aca2;
  border-radius:30px;
  text-decoration:none;
  color:black;
  display:inline-block;
  transition:0.3s;
}

.btn:hover{
  background:white;
}

/* SECTION */
.section{
  padding:90px 20px;
  text-align:center;
}

.section h2{
  margin-bottom:25px;
  color:#5A2E48;
  font-size:32px;
}

/* CARDS */
.cards{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:25px;
}

.card{
  width:280px;
  border-radius:20px;
  overflow:hidden;
  background:white;
  box-shadow:0 15px 35px rgba(0,0,0,0.1);
  transition:0.4s;
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card p{
  padding:15px;
  font-weight:500;
}

.card:hover{
  transform:translateY(-10px) scale(1.03);
}

/* FOOTER */
footer{
  background:#5A2E48;
  color:white;
  padding:25px;
  text-align:center;
}

/* ANIMATION */
@keyframes fadeIn{
  from{
    opacity:0;
    transform:translateY(40px);
  }
  to{
    opacity:1;
    transform:translateY(-50%);
  }
}

/* MOBILE */
@media(max-width:768px){
  .content h1{
    font-size:40px;
  }

  header{
    padding:10px 20px;
  }
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="logo">Hillora</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Destinations</a>
    <a href="#">About</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">

  <video autoplay muted loop playsinline>
    <source src="hillora.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="content">
    <h1>Hillora</h1>
    <p>Lose Yourself in the Calm of Nature</p>
    <a href="#" class="btn">Explore Now</a>
  </div>

</section>

<!-- DESTINATIONS -->
<section class="section">
  <h2>Top Destinations</h2>

  <div class="cards">
    <div class="card">
      <img src="https://source.unsplash.com/400x300/?manali">
      <p>Manali</p>
    </div>

    <div class="card">
      <img src="https://source.unsplash.com/400x300/?kashmir">
      <p>Kashmir</p>
    </div>

    <div class="card">
      <img src="https://source.unsplash.com/400x300/?goa">
      <p>Goa</p>
    </div>
  </div>
</section>

<!-- ABOUT -->
<section class="section">
  <h2>About Hillora</h2>
  <p>We create peaceful travel experiences that reconnect you with nature.</p>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 Hillora | Travel with Peace</p>
</footer>

</body>
</html>
