<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hillora Escapes | The Ultimate Nature & Wellness Retreat</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #a8e6cf;
    --glass: rgba(255,255,255,0.08);
    --border: rgba(255,255,255,0.15);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Poppins',sans-serif;
    color:#fff;
    overflow-x:hidden;
}

/* ===== FULL VIDEO BACKGROUND ===== */
.video-wrapper{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:-2;
    overflow:hidden;
}

#main-video{
    position:absolute;
    top:50%;
    left:50%;
    min-width:100%;
    min-height:100%;
    transform:translate(-50%,-50%);
    object-fit:cover;
}

/* DARK OVERLAY */
.video-overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.55);
    z-index:-1;
}

/* NAV */
nav{
    position:fixed;
    width:100%;
    padding:20px 8%;
    display:flex;
    justify-content:space-between;
    z-index:1000;
    backdrop-filter:blur(10px);
}

.logo{
    font-family:'Playfair Display';
    font-size:2rem;
}

/* SECTION */
section{
    padding:100px 8%;
    background:rgba(0,0,0,0.25);
    backdrop-filter:blur(6px);
    margin:20px;
    border-radius:20px;
}

.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:none;
}

.hero h1{
    font-size:70px;
    font-family:'Playfair Display';
}

.btn{
    margin-top:20px;
    padding:12px 30px;
    border:1px solid var(--primary);
    border-radius:30px;
    text-decoration:none;
    color:white;
}

.cards{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
}

.card{
    width:260px;
    background:var(--glass);
    border:1px solid var(--border);
    border-radius:15px;
    overflow:hidden;
}

.card img{
    width:100%;
    height:160px;
    object-fit:cover;
}

footer{
    text-align:center;
    padding:40px;
    background:rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<!-- VIDEO -->
<div class="video-wrapper">
    <video autoplay muted loop playsinline id="main-video">
        <source src="hillora.mp4" type="video/mp4">
    </video>
</div>

<div class="video-overlay"></div>

<!-- NAV -->
<nav>
    <div class="logo">HILLORA</div>
</nav>

<!-- HERO -->
<section class="hero">
    <h1>Hillora</h1>
    <p>Lose Yourself in the Calm of Nature</p>
    <a href="#" class="btn">Explore</a>
</section>

<!-- DESTINATIONS -->
<section>
    <h2>Top Destinations</h2>
    <div class="cards">
        <div class="card">
            <img src="https://source.unsplash.com/400x300/?mountain">
            <p>Manali</p>
        </div>
        <div class="card">
            <img src="https://source.unsplash.com/400x300/?kashmir">
            <p>Kashmir</p>
        </div>
        <div class="card">
            <img src="https://source.unsplash.com/400x300/?goa">
            <p>Goa</p>
        </div>
    </div>
</section>

<!-- ABOUT -->
<section>
    <h2>About Hillora</h2>
    <p>Luxury nature escape designed for peace and adventure.</p>
</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 Hillora</p>
</footer>

</body>
</html>
